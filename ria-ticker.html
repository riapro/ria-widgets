<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RIA Market Ticker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; }
  .tradingview-widget-container { width: 100%; height: 56px; }
</style>
</head>
<body>
<div class="tradingview-widget-container">
  <div class="tradingview-widget-container__widget"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
  {
    "symbols": [
      {"description": "S&P 500", "proName": "AMEX:SPY"},
      {"description": "Nasdaq", "proName": "NASDAQ:QQQ"},
      {"description": "Dow",    "proName": "AMEX:DIA"},
      {"description": "10Y",    "proName": "AMEX:TLT"},
      {"description": "VIX",    "proName": "AMEX:VXX"},
      {"description": "BTC",    "proName": "COINBASE:BTCUSD"}
    ],
    "showSymbolLogo": true,
    "colorTheme": "dark",
    "isTransparent": false,
    "displayMode": "adaptive",
    "locale": "en"
  }
  </script>
</div>
</body>
</html>
